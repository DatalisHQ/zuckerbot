name: Public package CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and smoke-test MCP contracts
        run: npm run check:smoke

      - name: Validate public repository boundary
        run: npm run check:public

      - name: Verify npm package contents
        run: npm pack --dry-run
